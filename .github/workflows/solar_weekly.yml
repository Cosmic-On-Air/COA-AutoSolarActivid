name: Auto Generate Solar Activity Video weekly

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      YOUTUBE_VIDEO_PATH: solar_activity_videos/weekly/final_video.mp4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔐 RESTAURATION DES SECRETS
      - name: Restore YouTube OAuth credentials
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > client_secret.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly solar activity script
        run: python autovideo_weekly.py

      - name: Set stable alias for weekly video
        run: |
          set -e
          LATEST=$(find solar_activity_videos/weekly -type f -name '*.mp4' -printf '%T@ %p\n' | sort -nr | awk '{print $2}' | head -n 1 || true)
          if [ -z "$LATEST" ]; then
            echo "No video found to alias under solar_activity_videos/weekly/."
            exit 1
          fi
          mkdir -p solar_activity_videos/weekly
          cp "$LATEST" solar_activity_videos/weekly/final_video.mp4

      - name: Upload generated weekly video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar_activity_video_weekly
          path: |
            solar_activity_videos/weekly/final_video.mp4
            solar_activity_videos/weekly/**/*.mp4

      # 🔒 COMMIT GITHUB (inchangé)
      - name: Commit all modified/generated files in one commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A Protons/weekly || true
          git add -A solar_activity_videos/weekly || true

          if ! git diff --cached --quiet; then
            git commit -m "Weekly update: proton JSON and video $(date +'%d:%m:%Y')"
            git push
          else
            echo "Aucun changement à committer"
          fi

  upload:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore YouTube OAuth credentials
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > client_secret.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-api-python-client

      - name: Download artifact (weekly video)
        uses: actions/download-artifact@v4
        with:
          name: solar_activity_video_weekly
          path: ./artifact_weekly

      - name: Compute weekly label from filename
        id: weekly_label
        run: |
          FILE_ALIAS=./artifact_weekly/final_video.mp4
          LABEL_FILE=$(ls -1t ./artifact_weekly/*.mp4 | grep -v 'final_video.mp4' | head -n 1)
          if [ -z "$LABEL_FILE" ]; then LABEL_FILE=$FILE_ALIAS; fi
          NAME=$(basename "$LABEL_FILE")
          NAME_NO_EXT=${NAME%.mp4}
          echo "file=$FILE_ALIAS" >> $GITHUB_OUTPUT
          echo "label=$NAME_NO_EXT" >> $GITHUB_OUTPUT

      - name: Upload weekly video to YouTube Shorts
        run: |
          python upload_youtube.py \
            --video "${{ steps.weekly_label.outputs.file }}" \
            --type WEEKLY \
            --label "${{ steps.weekly_label.outputs.label }}"
