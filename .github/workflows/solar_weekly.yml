name: Weekly script

on:
  schedule:
    - cron: '0 0 * * 1'   # Lundi 00:00 UTC
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ============================================================
      # 1. Checkout
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================================
      # 2. Python
      # ============================================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ============================================================
      # 3. Dépendances
      # ============================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-api-python-client google-auth google-auth-oauthlib

      # ============================================================
      # 3.1 FFmpeg (for future audio muxing support)
      # ============================================================
      - name: Install ffmpeg (Ubuntu)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg

      # ============================================================
      # 4. Restaurer OAuth
      # ============================================================
      - name: Restore YouTube OAuth credentials
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > client_secret.json

      # ============================================================
      # 5. Génération vidéo weekly (with automatic retry on network failure)
      # ============================================================
      - name: Run weekly solar activity script
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 90
          max_attempts: 3
          retry_wait_seconds: 600   # 10 min entre chaque tentative
          command: python scripts/autovideo_weekly.py
          on_retry_command: echo "⏳ Tentative échouée (problème réseau ?), nouvelle tentative dans 10 min..."

      # ============================================================
      # 6. Alias stable final_video.mp4
      # ============================================================
      - name: Set stable alias for weekly video
        shell: bash
        run: |
          set -euo pipefail

          LATEST="$(
            find solar_activity_videos/weekly -type f -name '*.mp4' ! -name 'final_video.mp4' -print0 \
            | xargs -0 -r ls -1t \
            | head -n 1
          )"

          if [ -z "${LATEST:-}" ]; then
            echo "No weekly video found (or only alias present), skipping alias step."
            exit 0
          fi

          mkdir -p solar_activity_videos/weekly
          if [ "${LATEST}" != "solar_activity_videos/weekly/final_video.mp4" ]; then
            cp -- "${LATEST}" solar_activity_videos/weekly/final_video.mp4
          fi

      # ============================================================
      # 7. Upload YouTube Shorts (weekly)
      # ============================================================
      - name: Upload weekly video to YouTube Shorts
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          WEEK=$(date +'%V')
          YEAR=$(date +'%Y')
          LABEL="Week ${WEEK} ${YEAR}"

          python scripts/upload_youtube.py \
            --video solar_activity_videos/weekly/final_video.mp4 \
            --type WEEKLY \
            --label "${LABEL}"


      # ============================================================
      # 8. Artifacts GitHub (conservé)
      # ============================================================
      - name: Upload weekly video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar_activity_video_weekly
          path: |
            solar_activity_videos/weekly/final_video.mp4
            solar_activity_videos/weekly/**/*.mp4

      # ============================================================
      # 9. Commit GitHub (conservé)
      # ============================================================
      - name: Commit all modified/generated files in one commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A Protons/weekly || true
          git add -A solar_activity_videos/weekly || true

          WEEK=$(date +'%V')
          START=$(date -d '7 days ago' +'%d%m%Y')
          END=$(date +'%d%m%Y')
          if ! git diff --cached --quiet; then
            git commit -m "Weekly update: proton JSON & solar video - Week #${WEEK} (${START}-${END})"
            git pull --rebase
            git push
          else
            echo "Aucun changement à committer"
          fi
