name: Daily script

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ============================================================
      # 1. Checkout
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================================
      # 2. Python
      # ============================================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ============================================================
      # 3. Dependencies
      # ============================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-api-python-client google-auth google-auth-oauthlib

      # ============================================================
      # 3.1 FFmpeg (for future audio muxing support)
      # ============================================================
      - name: Install ffmpeg (Ubuntu)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          
      # ============================================================
      # 4. Restore OAuth (SECRETS → FILES)
      # ============================================================
      - name: Restore YouTube OAuth credentials
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > client_secret.json

      # ============================================================
      # 5. Generate video (with automatic retry on network failure)
      # ============================================================
      - name: Run daily solar activity script
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 45
          max_attempts: 3
          retry_wait_seconds: 600   # 10 min entre chaque tentative
          command: python scripts/autovideo_daily.py
          on_retry_command: echo "⏳ Tentative échouée (problème réseau ?), nouvelle tentative dans 10 min..."

      # ============================================================
      # 6. Resolve latest video → final_video.mp4
      # ============================================================
      - name: Set stable alias for daily video
        run: |
          set -e
          LATEST=$(find solar_activity_videos/daily -type f -name '*.mp4' -printf '%T@ %p\n' | sort -nr | awk '{print $2}' | head -n 1)
          if [ "$LATEST" != "solar_activity_videos/daily/final_video.mp4" ]; then
            cp -- "$LATEST" solar_activity_videos/daily/final_video.mp4
          fi

      # ============================================================
      # 7. Upload YouTube Shorts
      # ============================================================
      - name: Upload daily video to YouTube Shorts
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          YEST=$(date -u -d 'yesterday' +'%d/%m/%Y')
          python scripts/upload_youtube.py \
            --video solar_activity_videos/daily/final_video.mp4 \
            --type DAILY \
            --label "${YEST}"

      # ============================================================
      # 8. Artifacts (optionnel mais conservé)
      # ============================================================
      - name: Upload daily video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar_activity_video_daily
          path: solar_activity_videos/daily/final_video.mp4

      # ============================================================
      # 9. Commit GitHub (inchangé)
      # ============================================================
      - name: Commit all modified/generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A Protons/daily || true
          git add -A solar_activity_videos/daily || true

          YEST=$(date -u -d 'yesterday' +'%d/%m/%Y')
          if ! git diff --cached --quiet; then
            git commit -m "Daily update: proton JSON and video ${YEST}"
            git pull --rebase
            git push
          else
            echo "Aucun changement à committer"
          fi
