name: Auto Generate Solar Activity Video daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      YOUTUBE_VIDEO_PATH: solar_activity_videos/daily/final_video.mp4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔐 RESTAURATION DES SECRETS
      - name: Restore YouTube OAuth credentials
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > client_secret.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google API client
        run: pip install google-api-python-client

      - name: Run daily solar activity script
        run: python autovideo_daily.py

      - name: Set stable alias for daily video
        run: |
          set -e
          LATEST=$(find solar_activity_videos/daily -type f -name '*.mp4' -printf '%T@ %p\n' | sort -nr | awk '{print $2}' | head -n 1 || true)
          if [ -z "$LATEST" ]; then
            echo "No video found to alias under solar_activity_videos/daily/."
            exit 1
          fi
          mkdir -p solar_activity_videos/daily
          cp "$LATEST" solar_activity_videos/daily/final_video.mp4

      - name: Upload generated daily video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar_activity_video_daily
          path: ${{ env.YOUTUBE_VIDEO_PATH }}

      # 🔒 COMMIT GITHUB (inchangé)
      - name: Commit all modified/generated files in one commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A Protons/daily || true
          git add -A solar_activity_videos/daily || true

          if ! git diff --cached --quiet; then
            git commit -m "Daily update: proton JSON and video $(date +'%d:%m:%Y')"
            git push
          else
            echo "Aucun changement à committer"
          fi

  upload:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore YouTube OAuth credentials
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > client_secret.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-api-python-client

      - name: Download artifact (daily video)
        uses: actions/download-artifact@v4
        with:
          name: solar_activity_video_daily
          path: ./artifact_daily

      - name: Upload daily video to YouTube Shorts
        run: |
          DATE=$(date +'%Y-%m-%d')
          FILE=$(ls -1 ./artifact_daily/*.mp4 | head -n 1)
          python upload_youtube.py \
            --video "$FILE" \
            --type DAILY \
            --label "${DATE}"
