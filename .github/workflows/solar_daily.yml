name: Auto Generate Solar Activity Video

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔐 RESTAURATION DES SECRETS
      - name: Restore YouTube OAuth credentials
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > client_secret.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google API client
        run: pip install google-api-python-client

      - name: Run daily solar activity script
        run: python autovideo_daily.py

      # 🔵 UPLOAD YOUTUBE
      - name: Upload daily video to YouTube Shorts
        run: |
          DATE=$(date +'%Y-%m-%d')
          python upload_youtube.py \
            --video solar_activity_videos/daily/final_video.mp4 \
            --type DAILY \
            --label "${DATE}"

      # 🔵 PLAYLISTS (30 jours glissants)
      - name: Manage YouTube playlists (daily)
        run: python youtube_manage_playlists.py --type DAILY

      # 🔒 ARTIFACTS
      - name: Upload final videos as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solar_activity_videos_daily
          path: solar_activity_videos/daily/**/*.mp4

      # 🔒 COMMIT GITHUB (inchangé)
      - name: Commit all modified/generated files in one commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A Protons/daily || true
          git add -A solar_activity_videos/daily || true

          if ! git diff --cached --quiet; then
            git commit -m "Daily update: proton JSON and video $(date +'%d:%m:%Y')"
            git push
          else
            echo "Aucun changement à committer"
          fi
